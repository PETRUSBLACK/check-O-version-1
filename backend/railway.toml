[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health/"
healthcheckTimeout = 60
healthcheckInterval = 10
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
startCommand = "sh -c 'python manage.py migrate --noinput && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p ${PORT:-8000} config.asgi:application'"