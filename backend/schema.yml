components:
  schemas:
    AnalyticsEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: integer
          readOnly: true
          nullable: true
        event_type:
          type: string
          maxLength: 64
        payload: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - event_type
      - id
      - updated_at
      - user
    AnalyticsEventRequest:
      type: object
      properties:
        event_type:
          type: string
          minLength: 1
          maxLength: 64
        payload: {}
      required:
      - event_type
    BlankEnum:
      enum:
      - ''
    Business:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        owner:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        status:
          allOf:
          - $ref: '#/components/schemas/BusinessStatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - owner
      - slug
      - status
      - updated_at
    BusinessRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        slug:
          type: string
          minLength: 1
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - name
      - slug
    BusinessStatusEnum:
      enum:
      - pending
      - approved
      - rejected
      - suspended
      type: string
      description: |-
        * `pending` - Pending
        * `approved` - Approved
        * `rejected` - Rejected
        * `suspended` - Suspended
    ModeEnum:
      enum:
      - vendor_managed
      - partner
      type: string
      description: |-
        * `vendor_managed` - Vendor managed
        * `partner` - Logistics partner
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        body:
          type: string
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - title
      - updated_at
    NotificationRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        body:
          type: string
        read_at:
          type: string
          format: date-time
          nullable: true
      required:
      - title
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        customer:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/OrderStatusEnum'
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - customer
      - id
      - items
      - status
      - total
      - updated_at
    OrderCreateRequest:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderLineWriteRequest'
      required:
      - items
    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product:
          type: integer
        product_name:
          type: string
          readOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        unit_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
