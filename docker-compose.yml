services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartmall
      POSTGRES_PASSWORD: smartmall
      POSTGRES_DB: smartmall
    volumes:
      - smartmall_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartmall -d smartmall"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    environment:
      DEBUG: "1"
      SECRET_KEY: dev-only-change-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DATABASE_URL: postgres://smartmall:smartmall@db:5432/smartmall
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  smartmall_pg:
